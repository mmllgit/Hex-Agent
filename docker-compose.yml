services:
  mongodb:
    image: mongo:7
    container_name: lol-agent-mongo
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: lol_agent
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: lol-agent-backend
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/lol_agent
      PORT: "3001"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lol-agent-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      BACKEND_INTERNAL_URL: http://backend:3001
    restart: unless-stopped

volumes:
  mongo-data:
