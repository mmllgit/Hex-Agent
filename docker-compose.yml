services:
  mongodb:
    image: mongo:7
    container_name: lol-agent-mongo
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: lol_agent
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: lol-agent-backend
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/lol_agent
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.siliconflow.cn/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-ai/DeepSeek-V3}
      PORT: "3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:3001
    container_name: lol-agent-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
